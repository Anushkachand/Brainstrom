services:
  - type: web
    name: skillsync-backend
    env: node
    buildCommand: docker build -t skillsync .
    startCommand: docker run -p $PORT:8000 skillsync
    envVars:
      - key: DB_HOST
        value: your-render-db-host
      - key: DB_USER
        value: your-db-user
      - key: DB_PASS
        value: your-db-pass
      - key: DB_NAME
        value: your-db-name